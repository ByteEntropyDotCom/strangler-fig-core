name: Manual Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Gateway Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: false
          tags: gateway-service:latest

      - name: Build Modern Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./modern-service
          push: false
          tags: modern-service:latest

      - name: Build Legacy Monolith Image
        uses: docker/build-push-action@v5
        with:
          context: ./legacy-monolith
          push: false
          tags: legacy-monolith:latest

      - name: Build Discovery Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./discovery-server
          push: false
          tags: discovery-server:latest
